<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Need for Speed | Artbook Library</title>
    <meta name="description" content="Need for Speed exhibition page in Artbook Library." />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap');

      html {
        scroll-behavior: smooth;
        scroll-padding-top: 80px;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: #f5f2eb;
        color: #2c2a26;
        margin: 0;
      }

      h1,
      h2,
      h3,
      h4,
      .font-serif {
        font-family: 'Playfair Display', serif;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      @keyframes fade-in-up {
        0% {
          opacity: 0;
          transform: translateY(30px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-fade-in-up {
        animation: fade-in-up 1s cubic-bezier(0.2, 1, 0.3, 1) forwards;
      }

      .animate-delay-200 {
        animation-delay: 0.2s;
      }

      .animate-delay-400 {
        animation-delay: 0.4s;
      }

    </style>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <div id="root" data-page="artbook" data-slug="silent-monoliths"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
